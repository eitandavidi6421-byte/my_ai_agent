<!DOCTYPE html>
<html lang="he" dir="rtl">

<head>
  <meta charset="UTF-8">
  <title>Smart AI Agent</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <header class="app-header" role="banner">
    <div class="logo-area" aria-label="לוגו האפליקציה">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
        stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6" />
      </svg>
      AI Agent
    </div>

    <div class="user-profile" id="user-profile-ui" style="display: none;" aria-live="polite">
      <img id="user-avatar" src="" alt="תמונת פרופיל">
      <span id="user-name"></span>
    </div>

    <nav class="header-actions" aria-label="תפריט פעולות עליון">
      <button id="export-log" class="header-btn" aria-label="הורד יומן מערכת" title="הורד יומן מערכת">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
          <polyline points="14 2 14 8 20 8"></polyline>
          <line x1="12" y1="18" x2="12" y2="12"></line>
          <line x1="9" y1="15" x2="15" y2="15"></line>
        </svg>
      </button>
      <button id="clear-chat" class="header-btn" aria-label="נקה שיחה" title="נקה שיחה">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <polyline points="3 6 5 6 21 6"></polyline>
          <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
        </svg>
      </button>
    </nav>
  </header>

  <main id="login-screen" class="screen-container" role="main" aria-labelledby="login-title">
    <div class="welcome-icon" aria-hidden="true">✨</div>
    <h3 id="login-title">ברוך הבא לטייס המשנה שלך</h3>
    <p id="login-desc">הזן את כתובת האימייל של חשבון Google שלך כדי להתחיל.</p>

    <div id="auth-error-msg"
      style="display:none; color: #ef4444; margin-bottom: 12px; text-align: center; font-size: 0.85em; font-weight: bold;"
      aria-live="assertive"></div>

    <div style="width:100%; display:flex; flex-direction:column; gap:10px; margin-bottom:16px;">
      <input type="email" id="email-input" placeholder="דוא״ל: your@gmail.com" aria-label="כתובת אימייל"
        style="padding:10px 14px; border-radius:10px; border:1px solid #333; background:#1a1a1f; color:#f3f4f6; font-size:0.9em; width:100%; box-sizing:border-box; direction:ltr;" required>
      <button id="login-btn" class="primary-btn" aria-label="כניסה עם Google">
        כניסה עם Google
      </button>
    </div>
  </main>



  <main id="app-screen" role="main" aria-label="ממשק צ'אט עם בינה מלאכותית">

    <section id="chat" role="log" aria-live="polite" aria-atomic="false">
    </section>

    <nav id="quick-actions" aria-label="פעולות מהירות">
      <button class="quick-btn" aria-label="סכם את תוכן העמוד">סכם לי את העמוד</button>
      <button class="quick-btn" aria-label="חלץ נתונים מובנים לאקסל">חלץ נתונים לאקסל</button>
      <button class="quick-btn" aria-label="צור טיוטת אימייל חדש">שלח אימייל חדש</button>
      <button id="open-dashboard-btn" aria-label="פתח מנהל נחיל" style="padding: 8px 16px; border-radius: 9999px; font-weight: 600; font-size: 13px; color: white; cursor: pointer; white-space: nowrap; background: linear-gradient(135deg, #a29bfe, #6c5ce7); border: none; box-shadow: 0 2px 8px rgba(108, 92, 231, 0.4);">🚀 פתח מרכז נחיל (Swarm)</button>
    </nav>

    <section id="input-area" role="search" aria-label="שדה הקלדת הודעה">
      <div class="input-wrapper">
        <input type="text" id="input" placeholder="איך אוכל לעזור לך היום?" aria-label="הקלד את הבקשה שלך כאן"
          autocomplete="off">
        <button id="send-btn" aria-label="שלח הודעה" title="שלח">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round" style="transform: rotate(180deg); margin-left: -2px;">
            <line x1="22" y1="2" x2="11" y2="13"></line>
            <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
          </svg>
        </button>
      </div>
    </section>

  </main>

  <script src="marked.min.js"></script>
  <script src="popup.js"></script>

</body>

</html>
